<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0F0A1E">
<meta name="apple-mobile-web-app-title" content="SpellStar">
<link rel="manifest" href="manifest.json">
<title>SpellStar ⭐</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7/babel.min.js"></script>
<style>

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --primary: #7C3AED; --primary-light: #8B5CF6;
  --gold: #F59E0B; --success: #10B981; --danger: #EF4444; --warning: #F97316;
  --bg: #0F0A1E; --bg2: #1A0F35; --card: #1E1340; --card2: #2A1A55;
  --border: rgba(124,58,237,0.3); --text: #F1F5F9; --text2: #94A3B8; --radius: 16px;
}
html, body { height: 100%; overflow-x: hidden; }
body {
  font-family: 'Nunito', system-ui, -apple-system, sans-serif;
  background: var(--bg);
  background-image: radial-gradient(ellipse at 20% 50%, rgba(124,58,237,0.15) 0%, transparent 60%),
                    radial-gradient(ellipse at 80% 20%, rgba(245,158,11,0.1) 0%, transparent 50%);
  color: var(--text); min-height: 100vh;
}
#root { display: flex; flex-direction: column; min-height: 100vh; }
.screen { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 16px 16px 32px; }
.screen-top { justify-content: flex-start; padding-top: 20px; }
.card { background: var(--card); border: 1px solid var(--border); border-radius: 24px; padding: 28px 24px; width: 100%; max-width: 460px; box-shadow: 0 20px 60px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.05); }
.w-max { max-width: 460px; width: 100%; }
h1 { font-size: 2rem; font-weight: 900; }
h2 { font-size: 1.5rem; font-weight: 800; }
h3 { font-size: 1.1rem; font-weight: 700; }
.btn { display: block; width: 100%; padding: 15px 20px; border-radius: 14px; border: none; font-size: 1.05rem; font-weight: 800; cursor: pointer; transition: transform 0.1s, box-shadow 0.2s, opacity 0.2s; font-family: inherit; text-align: center; outline: none; }
.btn:hover { transform: translateY(-1px); }
.btn:active { transform: translateY(1px) scale(0.98); }
.btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
.btn-primary { background: linear-gradient(135deg, #7C3AED, #6D28D9); color: white; box-shadow: 0 4px 20px rgba(124,58,237,0.4); }
.btn-primary:hover { box-shadow: 0 6px 25px rgba(124,58,237,0.5); }
.btn-gold { background: linear-gradient(135deg, #F59E0B, #D97706); color: #1a0f00; box-shadow: 0 4px 20px rgba(245,158,11,0.4); }
.btn-secondary { background: rgba(255,255,255,0.08); color: var(--text); border: 1px solid rgba(255,255,255,0.12); }
.btn-secondary:hover { background: rgba(255,255,255,0.12); }
.btn-success { background: linear-gradient(135deg, #10B981, #059669); color: white; }
.btn-danger { background: linear-gradient(135deg, #EF4444, #DC2626); color: white; }
.btn-sm { padding: 8px 14px; font-size: 0.85rem; width: auto; display: inline-block; }
.btn-icon { background: rgba(255,255,255,0.08); border: 1px solid var(--border); border-radius: 12px; padding: 8px 14px; width: auto; display: inline-flex; align-items: center; gap: 6px; font-size: 0.9rem; font-weight: 700; cursor: pointer; color: var(--text); font-family: inherit; transition: all 0.2s; }
.btn-icon:hover { background: rgba(255,255,255,0.14); }
.mt { margin-top: 12px; } .mt2 { margin-top: 20px; } .mb { margin-bottom: 10px; } .mb2 { margin-bottom: 18px; }
.flex { display: flex; align-items: center; } .between { justify-content: space-between; } .center { justify-content: center; } .col { flex-direction: column; } .wrap { flex-wrap: wrap; }
.text-center { text-align: center; } .text-sm { font-size: 0.85rem; } .text-xs { font-size: 0.75rem; } .text-lg { font-size: 1.2rem; }
.text-muted { color: var(--text2); } .text-gold { color: var(--gold); } .text-success { color: var(--success); } .text-danger { color: var(--danger); } .text-primary { color: var(--primary-light); } .bold { font-weight: 800; }
.input-field { width: 100%; padding: 14px 16px; border-radius: 12px; border: 2px solid rgba(255,255,255,0.12); background: rgba(255,255,255,0.06); color: var(--text); font-size: 1rem; font-family: inherit; font-weight: 700; outline: none; transition: border-color 0.2s, background 0.2s; }
.input-field:focus { border-color: var(--primary-light); background: rgba(255,255,255,0.09); }
.input-word { font-size: 1.6rem; letter-spacing: 3px; text-align: center; padding: 18px 16px; }
.input-pin { font-size: 2rem; text-align: center; letter-spacing: 8px; }
.progress-bar { background: rgba(255,255,255,0.08); border-radius: 100px; height: 8px; overflow: hidden; }
.progress-fill { height: 100%; border-radius: 100px; background: linear-gradient(90deg, var(--primary), var(--gold)); transition: width 0.5s ease; }
.badge { display: inline-flex; align-items: center; gap: 4px; padding: 4px 10px; border-radius: 100px; font-size: 0.8rem; font-weight: 800; white-space: nowrap; }
.badge-gold { background: rgba(245,158,11,0.2); color: var(--gold); border: 1px solid rgba(245,158,11,0.3); }
.badge-purple { background: rgba(124,58,237,0.2); color: #a78bfa; border: 1px solid rgba(124,58,237,0.3); }
.badge-green { background: rgba(16,185,129,0.2); color: #34d399; border: 1px solid rgba(16,185,129,0.3); }
.badge-red { background: rgba(239,68,68,0.2); color: #f87171; border: 1px solid rgba(239,68,68,0.3); }
.badge-blue { background: rgba(59,130,246,0.2); color: #60a5fa; border: 1px solid rgba(59,130,246,0.3); }
.badge-orange { background: rgba(249,115,22,0.2); color: #fb923c; border: 1px solid rgba(249,115,22,0.3); }
.mascot { font-size: 4rem; text-align: center; margin-bottom: 8px; line-height: 1; }
.logo-title { font-size: 3rem; font-weight: 900; text-align: center; background: linear-gradient(135deg, #a78bfa, var(--gold)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 6px; }
.subtitle { color: var(--text2); text-align: center; margin-bottom: 28px; }
.stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 14px 0; }
.stat-card { background: var(--card2); border: 1px solid var(--border); border-radius: 16px; padding: 16px; text-align: center; }
.stat-num { font-size: 1.8rem; font-weight: 900; line-height: 1.1; }
.stat-lbl { font-size: 0.7rem; color: var(--text2); text-transform: uppercase; letter-spacing: 1px; margin-top: 4px; }
.quest-card { background: linear-gradient(135deg, rgba(124,58,237,0.25), rgba(245,158,11,0.15)); border: 1px solid rgba(124,58,237,0.4); border-radius: 20px; padding: 20px; margin: 14px 0; }
.word-panel { background: rgba(255,255,255,0.04); border: 1px solid var(--border); border-radius: 20px; padding: 24px 20px; text-align: center; margin: 14px 0; }
.listen-btn { width: 64px; height: 64px; background: rgba(124,58,237,0.3); border: 2px solid rgba(124,58,237,0.6); border-radius: 50%; font-size: 1.8rem; cursor: pointer; display: flex; align-items: center; justify-content: center; margin: 0 auto 10px; transition: all 0.2s; color: inherit; font-family: inherit; }
.listen-btn:hover { background: rgba(124,58,237,0.5); transform: scale(1.05); }
.listen-btn:active { transform: scale(0.95); }
.listen-btn.speaking { background: rgba(124,58,237,0.55); animation: pulse 1s infinite; }
.cat-hint { font-size: 0.72rem; color: var(--text2); text-transform: uppercase; letter-spacing: 1.5px; margin-top: 6px; }
.sentence-box {
  background: rgba(255,255,255,0.04); border-left: 3px solid var(--primary-light);
  border-radius: 0 12px 12px 0; padding: 12px 16px; margin: 12px 0;
  font-size: 0.95rem; line-height: 1.7; font-style: italic; color: var(--text2); text-align: left;
}
.word-blank {
  display: inline-block; color: var(--gold); font-weight: 900; font-style: normal;
  letter-spacing: 3px; border-bottom: 2px solid var(--gold); padding-bottom: 1px;
  min-width: 30px; text-align: center;
}
.speech-status { font-size: 0.78rem; color: var(--primary-light); display: flex; align-items: center; justify-content: center; gap: 6px; margin: 6px 0; min-height: 22px; }
.pulse-dot { width: 8px; height: 8px; background: var(--primary-light); border-radius: 50%; animation: pulse 1s infinite; }
.letter-row { display: flex; gap: 5px; justify-content: center; flex-wrap: wrap; margin: 12px 0; }
.letter-box { width: 38px; height: 42px; border-radius: 8px; border: 2px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.04); display: flex; align-items: center; justify-content: center; font-size: 1.1rem; font-weight: 800; transition: all 0.2s; }
.letter-box.filled { border-color: var(--primary-light); background: rgba(124,58,237,0.15); }
.letter-box.correct { border-color: var(--success); background: rgba(16,185,129,0.15); color: var(--success); }
.letter-box.wrong-box { border-color: var(--danger); background: rgba(239,68,68,0.15); color: var(--danger); }
.word-chips { display: flex; flex-wrap: wrap; gap: 8px; margin: 10px 0; }
.chip { padding: 5px 12px; border-radius: 100px; font-size: 0.82rem; font-weight: 700; }
.chip-mastered { background: rgba(16,185,129,0.15); color: #34d399; }
.chip-learning { background: rgba(124,58,237,0.15); color: #a78bfa; }
.chip-shaky { background: rgba(245,158,11,0.15); color: #fbbf24; }
.chip-review { background: rgba(249,115,22,0.15); color: #fb923c; }
.chip-custom { background: rgba(59,130,246,0.15); color: #60a5fa; }
.divider { height: 1px; background: rgba(255,255,255,0.08); margin: 16px 0; }
.tab-bar { display: flex; gap: 8px; margin-bottom: 16px; overflow-x: auto; padding-bottom: 2px; }
.tab { padding: 8px 16px; border-radius: 100px; border: 1px solid transparent; background: rgba(255,255,255,0.07); color: var(--text2); font-family: inherit; font-weight: 700; font-size: 0.85rem; cursor: pointer; white-space: nowrap; transition: all 0.2s; }
.tab.active { background: var(--primary); color: white; border-color: transparent; box-shadow: 0 4px 15px rgba(124,58,237,0.3); }
.tab:hover:not(.active) { background: rgba(255,255,255,0.12); color: var(--text); }
.scrollable { max-height: 55vh; overflow-y: auto; padding-right: 4px; }
.scrollable::-webkit-scrollbar { width: 4px; }
.scrollable::-webkit-scrollbar-track { background: transparent; }
.scrollable::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 4px; }
.word-row { display: flex; align-items: center; justify-content: space-between; padding: 9px 4px; border-bottom: 1px solid rgba(255,255,255,0.05); }
.feedback-bar { padding: 16px; border-radius: 14px; text-align: center; font-size: 1.2rem; font-weight: 800; margin: 12px 0; }
.feedback-correct { background: rgba(16,185,129,0.2); color: var(--success); border: 1px solid rgba(16,185,129,0.3); }
.feedback-wrong { background: rgba(239,68,68,0.2); color: var(--danger); border: 1px solid rgba(239,68,68,0.3); }
.level-badge { display: inline-flex; align-items: center; gap: 6px; padding: 5px 12px; border-radius: 100px; background: rgba(245,158,11,0.15); color: var(--gold); font-size: 0.78rem; font-weight: 800; border: 1px solid rgba(245,158,11,0.3); margin-bottom: 10px; }
.select-field { width: 100%; padding: 14px 16px; border-radius: 12px; border: 2px solid rgba(255,255,255,0.12); background: rgba(255,255,255,0.06); color: var(--text); font-size: 1rem; font-family: inherit; font-weight: 700; outline: none; appearance: none; cursor: pointer; }
.select-field option { background: #1E1340; color: var(--text); }
label.field-label { display: block; font-size: 0.82rem; color: var(--text2); font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
.loading-screen { display: flex; align-items: center; justify-content: center; height: 100vh; font-size: 4rem; }
@keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-10px)} 40%{transform:translateX(10px)} 60%{transform:translateX(-8px)} 80%{transform:translateX(6px)} }
@keyframes pop { 0%{transform:scale(1)} 40%{transform:scale(1.12)} 100%{transform:scale(1)} }
@keyframes slideUp { from{opacity:0;transform:translateY(24px)} to{opacity:1;transform:translateY(0)} }
@keyframes fadeIn { from{opacity:0} to{opacity:1} }
@keyframes pulse { 0%,100%{box-shadow:0 0 0 0 rgba(124,58,237,0.4)} 50%{box-shadow:0 0 0 10px rgba(124,58,237,0)} }
@keyframes confetti { 0%{transform:scale(0.8);opacity:0} 50%{transform:scale(1.1)} 100%{transform:scale(1);opacity:1} }
@keyframes dotPulse { 0%,100%{opacity:0.3;transform:scale(0.8)} 50%{opacity:1;transform:scale(1.2)} }
.slide-up { animation: slideUp 0.4s ease; }
.fade-in { animation: fadeIn 0.3s ease; }
.anim-shake { animation: shake 0.4s ease; }
.anim-pop { animation: pop 0.3s ease; }
.anim-confetti { animation: confetti 0.5s ease; }
@media (max-width: 480px) {
  .card { padding: 22px 18px; border-radius: 20px; }
  .logo-title { font-size: 2.5rem; }
  .input-word { font-size: 1.4rem; }
}


.repair-card { background: linear-gradient(135deg, rgba(239,68,68,0.18), rgba(245,158,11,0.12)); border: 1px solid rgba(239,68,68,0.4); border-radius: 20px; padding: 20px; margin: 14px 0; }
.cram-card { background: linear-gradient(135deg, rgba(6,182,212,0.2), rgba(124,58,237,0.2)); border: 1px solid rgba(6,182,212,0.5); border-radius: 20px; padding: 20px; margin: 14px 0; }
.cram-badge { display: inline-flex; align-items: center; gap: 5px; background: rgba(6,182,212,0.2); border: 1px solid rgba(6,182,212,0.5); border-radius: 100px; padding: 3px 10px; font-size: 0.72rem; font-weight: 800; color: #67e8f9; letter-spacing: 0.5px; margin-bottom: 6px; }
.cram-progress-bar { height: 8px; border-radius: 99px; background: rgba(255,255,255,0.08); overflow: hidden; margin: 8px 0; }
.cram-progress-fill { height: 100%; border-radius: 99px; background: linear-gradient(90deg, #06b6d4, #7c3aed); transition: width 0.6s ease; }
.btn-cram { background: linear-gradient(135deg, #06b6d4, #0891b2); color: white; box-shadow: 0 4px 20px rgba(6,182,212,0.4); }
.btn-cram:hover { background: linear-gradient(135deg, #22d3ee, #06b6d4); }
.cram-setup-level { display: flex; align-items: center; gap: 12px; padding: 14px 16px; border-radius: 14px; border: 2px solid rgba(255,255,255,0.08); background: rgba(255,255,255,0.04); cursor: pointer; margin-bottom: 8px; transition: border-color 0.2s, background 0.2s; }
.cram-setup-level:hover { border-color: rgba(6,182,212,0.5); background: rgba(6,182,212,0.08); }
.cram-setup-level.selected { border-color: #06b6d4; background: rgba(6,182,212,0.15); }
.freeze-bar { background: rgba(59,130,246,0.12); border: 1px solid rgba(59,130,246,0.35); border-radius: 14px; padding: 10px 16px; font-size: 0.85rem; font-weight: 700; color: #93c5fd; margin: 8px 0; display: flex; align-items: center; gap: 8px; }
/* ── Sound It Out Mode ─────────────────────────────────────────────────────── */
.letter-box.close { border-color: var(--gold); background: rgba(245,158,11,0.15); color: var(--gold); }
.letter-box.wrong { border-color: var(--danger); background: rgba(239,68,68,0.12); color: var(--danger); }
.near-miss-bar { background: rgba(16,185,129,0.12); border: 1px solid rgba(16,185,129,0.35); border-radius: 14px; padding: 12px 16px; display: flex; gap: 10px; align-items: flex-start; font-size: 0.88rem; font-weight: 700; color: #34d399; margin: 10px 0; line-height: 1.4; }
.hint-panel { background: rgba(255,255,255,0.04); border: 1px solid rgba(124,58,237,0.3); border-radius: 16px; padding: 14px 16px; margin: 10px 0; }
.hint-panel-title { font-size: 0.75rem; color: var(--text2); text-transform: uppercase; letter-spacing: 1.5px; font-weight: 800; margin-bottom: 10px; }
.hint-item { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.06); font-size: 0.88rem; line-height: 1.4; }
.hint-item:last-child { border-bottom: none; padding-bottom: 0; }
.hint-num { width: 22px; height: 22px; border-radius: 50%; background: var(--primary); color: white; display: flex; align-items: center; justify-content: center; font-size: 0.72rem; font-weight: 900; flex-shrink: 0; }
.hint-play { background: rgba(124,58,237,0.25); border: 1px solid rgba(124,58,237,0.5); color: white; border-radius: 8px; padding: 4px 10px; cursor: pointer; font-size: 0.82rem; font-weight: 800; flex-shrink: 0; font-family: inherit; transition: background 0.2s; }
.hint-play:hover { background: rgba(124,58,237,0.5); }
.syllable-breakdown { font-size: 1.15rem; font-weight: 800; letter-spacing: 2px; color: var(--primary); }
.syllable-visual { font-family: monospace; font-size: 1.15rem; font-weight: 900; color: var(--gold); letter-spacing: 2px; }
.gap { gap: 10px; }
.feedback-info { padding: 12px 16px; border-radius: 12px; font-size: 0.88rem; font-weight: 700; text-align: center; margin: 8px 0; background: rgba(124,58,237,0.15); color: #a78bfa; border: 1px solid rgba(124,58,237,0.3); }

/* ── Light theme ──────────────────────────────────────────────────────────── */
body[data-theme="light"] {
  --bg: #F0EDF8; --bg2: #E5E0F5; --card: #FFFFFF; --card2: #F0EBFF;
  --border: rgba(124,58,237,0.22); --text: #1E0B3C; --text2: #6B5B8A;
  background: var(--bg);
}
body[data-theme="light"] .btn-secondary { background: rgba(0,0,0,0.06); color: var(--text); border-color: rgba(0,0,0,0.12); }
body[data-theme="light"] .btn-secondary:hover { background: rgba(0,0,0,0.1); }
body[data-theme="light"] .btn-icon { background: rgba(0,0,0,0.06); color: var(--text); }
body[data-theme="light"] .tab { background: rgba(0,0,0,0.06); color: var(--text2); }
body[data-theme="light"] .word-panel { background: rgba(0,0,0,0.04); }
body[data-theme="light"] .input-field { background: rgba(0,0,0,0.05); border-color: rgba(0,0,0,0.15); color: var(--text); }
body[data-theme="light"] .input-field:focus { background: rgba(0,0,0,0.07); }
body[data-theme="light"] .select-field { background: rgba(0,0,0,0.05); border-color: rgba(0,0,0,0.15); color: var(--text); }
body[data-theme="light"] .select-field option { background: #fff; color: var(--text); }
body[data-theme="light"] .sentence-box { background: rgba(0,0,0,0.04); }
body[data-theme="light"] .progress-bar { background: rgba(0,0,0,0.1); }
body[data-theme="light"] .hint-panel { background: rgba(0,0,0,0.03); }
body[data-theme="light"] .freeze-bar { background: rgba(59,130,246,0.08); }
body[data-theme="light"] .repair-card { background: linear-gradient(135deg,rgba(239,68,68,0.08),rgba(245,158,11,0.06)); }
body[data-theme="light"] .quest-card { background: linear-gradient(135deg,rgba(124,58,237,0.1),rgba(245,158,11,0.06)); }
body[data-theme="light"] .stat-card { background: rgba(0,0,0,0.04); }
body[data-theme="light"] .scrollable::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.2); }

/* ── Background gradients ─────────────────────────────────────────────────── */
body[data-bg="ocean"] { background-image: radial-gradient(ellipse at 20% 50%, rgba(6,182,212,0.18) 0%, transparent 60%), radial-gradient(ellipse at 80% 20%, rgba(16,185,129,0.12) 0%, transparent 50%); }
body[data-bg="sunset"] { background-image: radial-gradient(ellipse at 20% 50%, rgba(249,115,22,0.2) 0%, transparent 60%), radial-gradient(ellipse at 80% 20%, rgba(239,68,68,0.15) 0%, transparent 50%); }
body[data-bg="aurora"] { background-image: radial-gradient(ellipse at 20% 50%, rgba(16,185,129,0.18) 0%, transparent 60%), radial-gradient(ellipse at 80% 20%, rgba(6,182,212,0.12) 0%, transparent 50%); }
body[data-bg="galaxy"] { background-image: radial-gradient(ellipse at 20% 50%, rgba(29,78,216,0.2) 0%, transparent 60%), radial-gradient(ellipse at 80% 20%, rgba(109,40,217,0.18) 0%, transparent 50%); }
body[data-bg="rose"] { background-image: radial-gradient(ellipse at 20% 50%, rgba(244,63,94,0.18) 0%, transparent 60%), radial-gradient(ellipse at 80% 20%, rgba(168,85,247,0.12) 0%, transparent 50%); }
body[data-theme="light"][data-bg="space"] { background-image: radial-gradient(ellipse at 20% 50%, rgba(124,58,237,0.08) 0%, transparent 60%), radial-gradient(ellipse at 80% 20%, rgba(245,158,11,0.06) 0%, transparent 50%); }
body[data-theme="light"][data-bg="ocean"] { background-image: radial-gradient(ellipse at 20% 50%, rgba(6,182,212,0.1) 0%, transparent 60%), radial-gradient(ellipse at 80% 20%, rgba(16,185,129,0.08) 0%, transparent 50%); }
body[data-theme="light"][data-bg="sunset"] { background-image: radial-gradient(ellipse at 20% 50%, rgba(249,115,22,0.1) 0%, transparent 60%), radial-gradient(ellipse at 80% 20%, rgba(239,68,68,0.08) 0%, transparent 50%); }
body[data-theme="light"][data-bg="aurora"] { background-image: radial-gradient(ellipse at 20% 50%, rgba(16,185,129,0.1) 0%, transparent 60%), radial-gradient(ellipse at 80% 20%, rgba(6,182,212,0.07) 0%, transparent 50%); }

let preferredVoice = null;

function initVoices() {
  const pick = () => {
    const vs = window.speechSynthesis?.getVoices() || [];
    if (!vs.length) return;
    preferredVoice =

  pick();

}

// Generation counter — incrementing it aborts any in-flight TTS sequence
let ttsGen = 0;
function cancelTTS() { ttsGen++; window.speechSynthesis?.cancel(); }

// Speak a sequence: word → sentence → word again
// Calls onStateChange('word'|'sentence'|'word2'|'done') as it progresses
function speakWordSequence(word, sentence, onStateChange) {
  if (!window.speechSynthesis) { onStateChange && onStateChange('done'); return; }
  cancelTTS();
  const gen = ttsGen;

  // Replace quoted word in sentence with "blank" for TTS
  const re = new RegExp('"' + word.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + '"','gi');
  const sentenceSpoken = sentence.replace(re, '... blank ...');

  const parts = [
    { text: `Your word is... ${word}.`, rate: 0.62, state: 'word',     pause: 700  },
    { text: `${word}.`,                 rate: 0.60, state: 'word',     pause: 1500 },
    { text: sentenceSpoken,             rate: 0.80, state: 'sentence', pause: 1500 },
    { text: `Now spell... ${word}.`,    rate: 0.62, state: 'word2',    pause: 0    },
  ];

  let i = 0;
  const next = () => {
    if (ttsGen !== gen) return; // aborted by cancelTTS()
    if (i >= parts.length) { onStateChange && onStateChange('done'); return; }
    const { text, rate, state, pause } = parts[i++];
    onStateChange && onStateChange(state);
    const u = new SpeechSynthesisUtterance(text);
    u.rate = rate; u.pitch = 1.05;
    if (preferredVoice) { u.voice = preferredVoice; u.lang = preferredVoice.lang; }
    else u.lang = 'en-AU';
    u.onend = () => setTimeout(next, pause);
    u.onerror = () => { if (ttsGen === gen) setTimeout(next, 100); };
    window.speechSynthesis.speak(u);
  };
  setTimeout(next, 100);
}

function generateSentence(word, category) {
  const individual = WORD_SENTENCES[word.toLowerCase()];
  if (individual) return individual;
  const cat = (category || '').toLowerCase();
  let pool;
  if (/sight|high.freq|common word/i.test(cat)) pool = SIGHT_SENTENCES;
  else if (/math|numer|calculat/i.test(cat)) pool = MATHS_SENTENCES;
  else if (/science|biology|chemistry|physics|hass|geograph/i.test(cat)) pool = SCIENCE_SENTENCES;
  else if (/homophone|confus/i.test(cat)) pool = HOMOPHONE_SENTENCES;
  else if (/academic|literary|rhetoric|analyt/i.test(cat)) pool = ACADEMIC_SENTENCES;
  else pool = GENERAL_SENTENCES;

  // Deterministic selection (same word always gets same sentence)
  const hash = Math.abs(word.split('').reduce((a,c) => (a*31 + c.charCodeAt(0))|0, 0));
  const fn = pool[hash % pool.length];
  return fn(word);
}

// Render sentence with the quoted word replaced by a styled blank
function SentenceWithBlank({ word, sentence }) {
  const re = new RegExp('"' + word.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + '"','gi');
  const parts = sentence.split(re);
  const blank = ' ' + '_'.repeat(Math.max(word.length, 3)) + ' ';
  return React.createElement('div', { className: 'sentence-box' },
    ...parts.flatMap((p, i) => i < parts.length - 1
      ? [p, React.createElement('span', { key: i, className: 'word-blank' }, blank)]
      : [p]
    )
  );
}

const todayStr = () => new Date().toISOString().split('T')[0];
const yesterdayStr = () => { const d=new Date(); d.setDate(d.getDate()-1); return d.toISOString().split('T')[0]; };
const addDays = (n) => { const d=new Date(); d.setDate(d.getDate()+n); return d.toISOString().split('T')[0]; };
const daysBetween = (d1, d2) => Math.round((new Date(d2) - new Date(d1)) / 86400000);

function loadStore() { try { return JSON.parse(localStorage.getItem(STORE_KEY))||{}; } catch { return {}; } }
function saveStore(u) { const s=loadStore(); localStorage.setItem(STORE_KEY, JSON.stringify({...s,...u})); }

function shuffleArray(arr) {
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

function ageToLevelIdx(age) {
  const a=parseInt(age);
  if(a<=6) return 0; if(a<=7) return 1; if(a<=8) return 2; if(a<=9) return 3;
  if(a<=10) return 4; if(a<=11) return 5; if(a<=12) return 6; if(a<=13) return 7;
  if(a<=14) return 8; if(a<=15) return 9; if(a<=16) return 10; return 11;
}

function getAllLevelWords(li) {
  const lv=WORD_DATA[li]; if(!lv) return [];
  return lv.cats.flatMap(c=>c.words.map(w=>({word:w,category:c.cat,level:lv.label,levelIdx:li})));
}

// Get simpler (higher-priority category) words from a level
function getSimpleWords(levelIdx, count) {
  const lv = WORD_DATA[levelIdx]; if(!lv) return [];
  // Priority: sight words, CVC, high-frequency, simple, alphabet — then everything else
  const simplePat = /sight|high.freq|cvc|simple|common|alphabet|foundational|set 1|essential/i;
  const priorityCats = lv.cats.filter(c => simplePat.test(c.cat));
  const restCats = lv.cats.filter(c => !simplePat.test(c.cat));
  
  const fromPriority = priorityCats.flatMap(c =>
    shuffleArray(c.words).slice(0, Math.ceil(count/Math.max(priorityCats.length,1)))
      .map(w => ({word:w, category:c.cat, level:lv.label, levelIdx}))
  );
  const fromRest = shuffleArray(
    restCats.flatMap(c => c.words.map(w => ({word:w,category:c.cat,level:lv.label,levelIdx})))
  );

  return [...fromPriority, ...fromRest].slice(0,count);
}

// ── Diagnostic question builder ────────────────────────────────────────────
// NEVER exceeds the child's age/year level.
// Starts with Foundation basics, works progressively up to their level.
function buildDiagnosticQuestions(ageIdx) {
  const maxLevel = Math.min(ageIdx, WORD_DATA.length - 1);
  const questions = [];

  if (maxLevel === 0) {
    return shuffleArray(getSimpleWords(0, DIAGNOSTIC_SIZE));
  }

  if (maxLevel <= 3) {
    // Young kids: 4–5 questions per level, all levels from 0 to theirs
    for (let li = 0; li <= maxLevel; li++) {
      questions.push(...getSimpleWords(li, Math.ceil(DIAGNOSTIC_SIZE / (maxLevel + 1))));
    }
  } else {
    // Older kids: light sample of early levels, more at their level
    questions.push(...getSimpleWords(0, 3));  // Foundation basics
    questions.push(...getSimpleWords(1, 2));  // Year 1
    questions.push(...getSimpleWords(2, 2));  // Year 2
    // Intermediary: 1 question each
    for (let li = 3; li < maxLevel - 1; li++) {
      questions.push(...getSimpleWords(li, 1));
    }
    // One below their level
    questions.push(...getSimpleWords(maxLevel - 1, 3));
    // Their level — most questions
    questions.push(...getSimpleWords(maxLevel, 5));
  }

  return questions.slice(0, DIAGNOSTIC_SIZE);
}

function calcSpellingAge(results) {
  const byLevel = {};
  results.forEach(r => {
    if(!byLevel[r.levelIdx]) byLevel[r.levelIdx]={c:0,t:0};
    byLevel[r.levelIdx].t++;
    if(r.correct) byLevel[r.levelIdx].c++;
  });
  let best=0;
  for(const [li,s] of Object.entries(byLevel)) {
    if(s.t>=2 && s.c/s.t>=0.70) best=Math.max(best,parseInt(li));
  }
  return { spellingAge: WORD_DATA[best]?.label||WORD_DATA[0].label, levelIdx: best };
}

function buildSession(levelIdx, progress, customWords, size) {
  const today=todayStr(); const used=new Set(); const queue=[];
  for(const cw of (customWords||[])) {
    const p=progress[cw.word]||{stage:0};
    if(p.stage<4&&(!p.nextReview||p.nextReview<=today)) {
      queue.push({word:cw.word,category:'Custom Words',level:'Custom',levelIdx,isCustom:true,customSentence:cw.sentence||null});
      used.add(cw.word);
    }
  }
  const lw=getAllLevelWords(levelIdx);
  // Pass 1: due reviews
  for(const w of lw) {
    if(used.has(w.word)) continue;
    const p=progress[w.word];
    if(p&&p.stage>0&&p.stage<4&&p.nextReview&&p.nextReview<=today&&!p.skipped) { queue.push(w); used.add(w.word); }
  }
  // Pass 2: skipped words from yesterday (priority re-entry)
  for(const w of lw) {
    if(used.has(w.word)) continue;
    const p=progress[w.word];
    if(p&&p.skipped&&p.lastSkipped&&p.lastSkipped<today) { queue.push(w); used.add(w.word); }
  }
  // Pass 3: new words (iterate shuffled list and track used to handle cross-category dupes)
  for(const w of shuffleArray(lw)){
    if(progress[w.word]||used.has(w.word)) continue;
    queue.push(w); used.add(w.word);
  }
  // Final dedup (safety net) then slice
  const seen=new Set();
  return queue.filter(w=>seen.has(w.word)?false:seen.add(w.word)).slice(0,size||SESSION_SIZE);
}

function updateWordProgress(progress, word, correct, isCram=false, skipped=false) {
  const intervals = isCram ? CRAM_INTERVALS : REVIEW_INTERVALS;
  const p=progress[word]||{stage:0,correct:0,wrong:0};
  const ns=correct?Math.min(4,p.stage+1):Math.max(0,p.stage-1);
  const update={...p,stage:ns,correct:(p.correct||0)+(correct?1:0),wrong:(p.wrong||0)+(correct?0:1),nextReview:addDays(intervals[ns]||0),lastSeen:todayStr()};
  if(skipped){update.skipped=true;update.lastSkipped=todayStr();}
  else if(correct){update.skipped=false;}
  return {...progress,[word]:update};
}

function buildCramSession(profile, progress) {
  const today = todayStr();
  const used = new Set();
  const due = [], newWords = [];
  const fromIdx = profile.levelIdx;
  const toIdx = profile.cramMode?.targetLevelIdx ?? fromIdx;
  const excluded = new Set(profile.cramMode?.masteredAtStart || []);

  // Pass 1: due reviews across all levels (already introduced — reinforce first)
  for (let li = fromIdx; li <= toIdx; li++) {
    for (const w of getAllLevelWords(li)) {
      if (used.has(w.word) || excluded.has(w.word)) continue;
      const p = progress[w.word];
      if (p && p.stage >= 4) continue;
      if (p && p.stage > 0 && p.nextReview && p.nextReview <= today) {
        due.push(w); used.add(w.word);
      }
    }
  }

  // Pass 2: new words in strict level order — current level fully exhausted before moving up
  for (let li = fromIdx; li <= toIdx; li++) {
    for (const w of getAllLevelWords(li)) {
      if (used.has(w.word) || excluded.has(w.word)) continue;
      const p = progress[w.word];
      if (p && p.stage >= 4) continue;
      if (!p) { newWords.push(w); used.add(w.word); }
    }
  }

  const combined = [...shuffleArray(due), ...newWords];
  const seen = new Set();
  return combined.filter(w => seen.has(w.word) ? false : seen.add(w.word)).slice(0, CRAM_SESSION_SIZE);
}

function getCramProgress(profile, progress) {
  const toIdx = profile.cramMode?.targetLevelIdx ?? profile.levelIdx;
  const startDate = profile.cramMode?.startDate || todayStr();
  const excluded = new Set(profile.cramMode?.masteredAtStart || []);
  const msPerDay = 86400000;
  const daysDone = Math.min(CRAM_DAYS, Math.floor((new Date(todayStr()) - new Date(startDate)) / msPerDay) + 1);
  let total = 0, mastered = 0;
  for (let li = profile.levelIdx; li <= toIdx; li++) {
    for (const w of getAllLevelWords(li)) {
      if (excluded.has(w.word)) continue; // skip words already mastered before CRAM started
      total++;
      if ((progress[w.word]?.stage||0) >= 4) mastered++;
    }
  }
  const pct = total > 0 ? Math.min(100, Math.round(mastered / total * 100)) : 0;
  const daysLeft = Math.max(0, CRAM_DAYS - daysDone + 1);
  return { daysDone, daysLeft, mastered, total, pct };
}

function getProgressStats(progress) {
  const v=Object.values(progress);
  return {
    mastered:v.filter(p=>p.stage===4).length,
    consolidating:v.filter(p=>p.stage===3).length,
    learning:v.filter(p=>p.stage===2).length,
    shaky:v.filter(p=>p.stage===1).length,
    total:v.length,
    dueReview:v.filter(p=>p.stage>0&&p.stage<4&&((p.nextReview&&p.nextReview<=todayStr())||p.lastSeen===todayStr())).length,
  };
}

function getStrugglingWords(progress) {
  return Object.entries(progress)
    .filter(([,p]) => p.skipped || p.stage === 0 || ((p.wrong||0) >= 3 && p.stage <= 2))
    .sort(([,a],[,b]) => (b.wrong||0) - (a.wrong||0));
}



// ── Sound It Out Utilities ──────────────────────────────────────────────────

function syllabify(word) {
  const w = word.toLowerCase().replace(/[^a-z]/g,'');
  if (w.length <= 2) return [w];
  const isV = c => 'aeiouy'.includes(c);
  // Find vowel group start positions
  const vStarts = [];
  let pv = false;
  for (let i = 0; i < w.length; i++) { const v = isV(w[i]); if (v && !pv) vStarts.push(i); pv = v; }
  // Adjust for silent final e
  let effV = vStarts.length;
  if (w.endsWith('e') && effV > 1 && !isV(w[w.length - 2])) effV--;
  if (effV <= 1) return [w];
  // Build split points
  const splits = [0];
  for (let i = 0; i < Math.min(vStarts.length - 1, effV - 1); i++) {
    let ve = vStarts[i];
    while (ve < w.length && isV(w[ve])) ve++;
    const cc = vStarts[i + 1] - ve;
    splits.push(cc <= 1 ? ve : ve + 1);
  }
  splits.push(w.length);
  const result = splits.slice(0, -1).map((s, i) => w.slice(s, splits[i + 1])).filter(s => s.length > 0);
  return result.length > 1 ? result : [w];
}

function levenshtein(a, b) {
  const m = a.length, n = b.length;
  const dp = Array.from({length: m + 1}, (_, i) => Array.from({length: n + 1}, (_, j) => i === 0 ? j : j === 0 ? i : 0));
  for (let i = 1; i <= m; i++) for (let j = 1; j <= n; j++)
    dp[i][j] = a[i-1] === b[j-1] ? dp[i-1][j-1] : 1 + Math.min(dp[i-1][j], dp[i][j-1], dp[i-1][j-1]);
  return dp[m][n];
}

function isPhoneticNearMiss(attempt, word) {
  const a = attempt.toLowerCase(), w = word.toLowerCase();
  if (!a.length || a[0] !== w[0]) return false;
  const dist = levenshtein(a, w);
  const ratio = dist / Math.max(a.length, w.length, 1);
  if (ratio <= 0.35) return true;
  // Also check consonant skeleton similarity
  const aC = a.replace(/[aeiouy]/g, ''), wC = w.replace(/[aeiouy]/g, '');
  const cDist = levenshtein(aC, wC);
  return cDist / Math.max(aC.length, wC.length, 1) <= 0.25;
}

function getLetterFeedback(attempt, word) {
  const a = attempt.toLowerCase(), w = word.toLowerCase();
  const used = new Array(w.length).fill(false);
  const statuses = new Array(a.length).fill('wrong');
  // Pass 1: exact position matches
  for (let i = 0; i < a.length; i++) {
    if (i < w.length && a[i] === w[i]) { statuses[i] = 'correct'; used[i] = true; }
  }
  // Pass 2: letter exists but wrong position
  for (let i = 0; i < a.length; i++) {
    if (statuses[i] === 'correct') continue;
    for (let j = 0; j < w.length; j++) {
      if (!used[j] && a[i] === w[j]) { statuses[i] = 'close'; used[j] = true; break; }
    }
  }
  return [...a].map((char, i) => ({char, status: statuses[i]}));
}

function speakSyllable(text) {
  if (!window.speechSynthesis) return;
  cancelTTS();
  const u = new SpeechSynthesisUtterance(text);
  u.rate = 0.55; u.pitch = 1.05;
  if (preferredVoice) { u.voice = preferredVoice; u.lang = preferredVoice.lang; }
  else u.lang = 'en-AU';
  setTimeout(() => window.speechSynthesis.speak(u), 50);
}

// Speak each syllable individually with a pause between them
function speakSyllables(syllables, onDone) {
  if (!window.speechSynthesis || !syllables.length) { onDone?.(); return; }
  cancelTTS();
  let i = 0;
  const next = () => {
    if (i >= syllables.length) { onDone?.(); return; }
    const u = new SpeechSynthesisUtterance(syllables[i++]);
    u.rate = 0.48; u.pitch = 1.05;
    if (preferredVoice) { u.voice = preferredVoice; u.lang = preferredVoice.lang; }
    else u.lang = 'en-AU';
    u.onend = () => setTimeout(next, 380);
    u.onerror = () => setTimeout(next, 100);
    window.speechSynthesis.speak(u);
  };
  setTimeout(next, 50);
}

// ── Diagnostic Screen ──────────────────────────────────────────────────────
function DiagnosticScreen({profile, onDone}) {
  const [questions] = useState(() => buildDiagnosticQuestions(profile?.levelIdx||0));
  const [current, setCurrent] = useState(0);
  const [answer, setAnswer] = useState('');
  const [results, setResults] = useState([]);
  const [feedback, setFeedback] = useState(null);
  const [speechState, setSpeechState] = useState('idle'); // idle|word|sentence|word2|done
  const inputRef = useRef();

  const q = questions[current];
  const sentence = q ? generateSentence(q.word, q.category) : '';

  useEffect(() => {
    if (q) { setTimeout(() => doSpeak(), 500); }
  }, [current]);

  const doSpeak = () => {
    if (!q) return;
    setSpeechState('word');
    speakWordSequence(q.word, sentence, setSpeechState);
  };

  const submit = () => {
    if (!answer.trim() || feedback || speechState === 'word' || speechState === 'sentence' || speechState === 'word2') return;
    cancelTTS();
    const correct = answer.trim().toLowerCase() === q.word.toLowerCase();
    const newResults = [...results, {levelIdx:q.levelIdx, word:q.word, correct}];
    setResults(newResults);
    setFeedback(correct ? 'correct' : 'wrong');

    setTimeout(() => {
      setFeedback(null); setAnswer(''); setSpeechState('idle');
      if (current+1 >= questions.length) { onDone(newResults); }
      else { setCurrent(c=>c+1); inputRef.current?.focus(); }
    }, 1100);
  };

  if (!q) return null;
  const pct = Math.round(current/questions.length*100);

  const speechLabel = {
    word: 'Saying the word...',
    sentence: 'Reading the sentence...',
    word2: 'Saying the word again...',
    idle: '', done: ''
  }[speechState] || '';

  const isSpeaking = ['word','sentence','word2'].includes(speechState);

  return (
    <div className="screen slide-up">
      <div className="card">
        <div className="flex between mb">
          <h3>Spelling Check 📋</h3>
          <span className="badge badge-purple">{current+1}/{questions.length}</span>
        </div>
        <div className="progress-bar mb2">
          <div className="progress-fill" style={{width:pct+'%'}} />
        </div>

        <div className="level-badge">📚 {q.level} — {q.category}</div>

        <div className="word-panel">
          <button className={`listen-btn ${isSpeaking?'speaking':''}`} onClick={doSpeak}>
            {isSpeaking ? '🔊' : '▶'}
          </button>
          <div className="speech-status">
            {isSpeaking && <span className="pulse-dot"/>}
            {speechLabel || (!isSpeaking ? 'Tap ▶ to hear the word' : '')}
          </div>
          <SentenceWithBlank word={q.word} sentence={sentence} />
          <div className="cat-hint">Fill in the blank — what is the missing word?</div>
        </div>

        {feedback==='correct' && <div className="feedback-bar feedback-correct">✓ Correct! Well done!</div>}
        {feedback==='wrong' && <div className="feedback-bar feedback-wrong">The word was: <strong>{q.word}</strong></div>}

        {!feedback && (
          <>
            <input ref={inputRef} className="input-field input-word mt" type="text"
              value={answer} onChange={e=>setAnswer(e.target.value)}
              onKeyDown={e=>e.key==='Enter'&&submit()}
              placeholder="Type the word..." autoCapitalize="none" autoCorrect="off" spellCheck="false" />
            <button className="btn btn-primary mt" onClick={submit} disabled={!answer.trim()}>
              Check ✓
            </button>
          </>
        )}

        <div className="text-xs text-muted text-center mt2" style={{lineHeight:1.5}}>
          Don't worry if you don't know all the words — this helps find the right starting point for you.
        </div>
      </div>
    </div>
  );
}

function getLevelProgress(levelIdx, progress) {
  const levelWords = new Set(
    (WORD_DATA[levelIdx]?.cats||[]).flatMap(c => c.words.map(w => w.toLowerCase()))
  );
  const nextLevelWords = new Set(
    (WORD_DATA[levelIdx+1]?.cats||[]).flatMap(c => c.words.map(w => w.toLowerCase()))
  );
  const masteredHere = Object.entries(progress).filter(([w,p]) => p.stage===4 && levelWords.has(w.toLowerCase())).length;
  const masteredNext = Object.entries(progress).filter(([w,p]) => p.stage===4 && nextLevelWords.has(w.toLowerCase())).length;
  const totalHere = levelWords.size;
  const totalNext = nextLevelWords.size;
  const hasNext = WORD_DATA[levelIdx+1] != null;
  return { masteredHere, totalHere, masteredNext, totalNext, hasNext };
}

// ── Practice Screen ────────────────────────────────────────────────────────
function PracticeScreen({session, onComplete}) {
  const [answer, setAnswer] = useState('');
  // phases: speaking | answering | feedback | hinting | retry | correct
  const [phase, setPhase] = useState('speaking');
  const [speechState, setSpeechState] = useState('word');
  const [localResults, setLocalResults] = useState([]);
  const [xp, setXP] = useState(0);
  const [currentIdx, setCurrentIdx] = useState(0);
  const [anim, setAnim] = useState('');
  const [hintLevel, setHintLevel] = useState(0); // 0=none 1=first syllable 2=all syllables 3=visual
  const [lastAttempt, setLastAttempt] = useState('');
  const [nearMiss, setNearMiss] = useState(false);
  const [attemptCount, setAttemptCount] = useState(0);
  const inputRef = useRef();

  const queue = session.queue;
  const cw = queue[currentIdx];
  const sentence = cw ? (cw.customSentence || generateSentence(cw.word, cw.category)) : '';
  const syllables = cw ? syllabify(cw.word) : [];

  // Reset state on new word
  useEffect(() => {
    if (!cw) return;
    setPhase('speaking'); setAnswer(''); setSpeechState('word'); setAnim('');
    setHintLevel(0); setLastAttempt(''); setNearMiss(false); setAttemptCount(0);
    speakWordSequence(cw.word, sentence, (state) => {
      setSpeechState(state);
      if (state === 'done') { setPhase('answering'); setTimeout(() => inputRef.current?.focus(), 100); }
    });
  }, [currentIdx]);

  const isSpeaking = ['word','sentence','word2'].includes(speechState);
  const speechLabel = {word:'Saying the word...',sentence:'Reading the sentence...',word2:'Saying the word again...'}[speechState]||'';

  const reSpeak = () => {
    if (isSpeaking) return;
    cancelTTS();
    setPhase('speaking'); setSpeechState('word');
    speakWordSequence(cw.word, sentence, (state) => {
      setSpeechState(state);
      if (state === 'done') {
        const nextPhase = hintLevel > 0 ? 'retry' : 'answering';
        setPhase(nextPhase); setTimeout(() => inputRef.current?.focus(), 100);
      }
    });
  };

  const checkAnswer = (val) => {
    const attempt = (val !== undefined ? val : answer).trim();
    if (!attempt) return;
    cancelTTS();
    const correct = attempt.toLowerCase() === cw.word.toLowerCase();
    setLastAttempt(attempt);
    setAttemptCount(c => c + 1);

    if (correct) {
      const bonus = Math.max(5, 10 - Math.max(0, attemptCount - 1) * 2);
      const newXP = xp + bonus;
      setXP(newXP); setPhase('correct'); setAnim('anim-pop');
      const newResults = [...localResults, {word: cw.word, levelIdx: cw.levelIdx, correct: true}];
      setLocalResults(newResults);
      setTimeout(() => { setAnim(''); advance(newResults, newXP); }, 900);
    } else {
      const nm = isPhoneticNearMiss(attempt, cw.word);
      setNearMiss(nm);
      setPhase('feedback'); setAnim('anim-shake');
      setAnswer('');
    }
  };

  const useHint = () => {
    setHintLevel(1);
    speakSyllables(syllables);
  };

  const tryAgain = () => {
    setPhase('retry'); setAnswer(''); setAnim('');
    setTimeout(() => inputRef.current?.focus(), 100);
  };

  const skipWord = () => {
    const newResults = [...localResults, {word: cw.word, levelIdx: cw.levelIdx, correct: false, skipped: true}];
    setLocalResults(newResults);
    setTimeout(() => advance(newResults, xp), 300);
  };

  const advance = (results, earnedXP) => {
    const next = currentIdx + 1;
    if (next >= queue.length) onComplete({results, xpEarned: earnedXP});
    else setCurrentIdx(next);
  };

  if (!cw) return null;
  const pct = Math.round(currentIdx / queue.length * 100);

  // Wordle-style letter feedback for the last attempt
  const letterFeedback = lastAttempt ? getLetterFeedback(lastAttempt, cw.word) : null;

  // Visual hint: S__ / _ / ____
  // Which buttons to show in the action area
  const showInput = phase === 'speaking' || phase === 'answering' || phase === 'retry';
  const showFeedbackActions = phase === 'feedback';

  return (
    <div className="screen screen-top slide-up">
      <div className="w-max">
        {/* Top bar */}
        <div className="flex between mb">
          <div className="badge badge-gold">⭐ +{xp} XP</div>
          <div className="badge badge-purple">{currentIdx + 1}/{queue.length}</div>
        </div>
        <div className="progress-bar mb2">
          <div className="progress-fill" style={{width: pct + '%'}}/>
        </div>

        {/* Word panel */}
        <div className={`word-panel ${anim}`} onAnimationEnd={() => setAnim('')}>
          <button className={`listen-btn ${isSpeaking ? 'speaking' : ''}`} onClick={reSpeak} disabled={isSpeaking}>
            {isSpeaking ? '🔊' : '▶'}
          </button>
          <div className="speech-status">
            {isSpeaking && <span className="pulse-dot"/>}
            {speechLabel || (showInput ? 'Tap ▶ to hear again' : '')}
          </div>
          <SentenceWithBlank word={cw.word} sentence={sentence} />
          <div className="cat-hint">{cw.category}{cw.isCustom ? ' ✦ Custom' : ''}</div>
        </div>

        {/* Letter boxes */}
        {phase === 'feedback' && letterFeedback ? (
          // Wordle-style colored feedback
          <div className="letter-row">
            {letterFeedback.map((f, i) => (
              <div key={i} className={`letter-box ${f.status}`}>{f.char}</div>
            ))}
          </div>
        ) : phase === 'correct' ? (
          <div className="letter-row">
            {cw.word.split('').map((ch, i) => (
              <div key={i} className="letter-box correct">{ch}</div>
            ))}
          </div>
        ) : (
          <div className="letter-row">
            {cw.word.split('').map((_, i) => (
              <div key={i} className={`letter-box ${answer[i] ? 'filled' : ''}`}>{answer[i] || ''}</div>
            ))}
          </div>
        )}
        {cw.word.length > 10 && <div className="text-xs text-muted text-center mb">{cw.word.length} letters</div>}

        {/* Near-miss / feedback messages */}
        {phase === 'feedback' && nearMiss && (
          <div className="near-miss-bar">
            <span style={{fontSize:'1.1rem'}}>🎯</span>
            <span>That sounds right! Here's the tricky part — look at the highlighted letters above.</span>
          </div>
        )}
        {phase === 'feedback' && !nearMiss && (
          <div className="feedback-info">🔍 Green = correct · Amber = right letter, wrong spot · Red = not in word</div>
        )}

        {/* Correct celebration */}
        {phase === 'correct' && (
          <div className="feedback-bar feedback-correct">
            ✓ Correct! +{Math.max(5, 10 - Math.max(0, attemptCount - 1) * 2)} XP ⭐
          </div>
        )}


        {/* Input area */}
        {showInput && (
          <>
            <input ref={inputRef} className="input-field input-word mt" type="text"
              value={answer} onChange={e => setAnswer(e.target.value)}
              onKeyDown={e => e.key === 'Enter' && checkAnswer()}
              placeholder={phase === 'retry' ? 'Try again...' : 'Type the word...'}
              autoCapitalize="none" autoCorrect="off" autoComplete="off" spellCheck="false" autoFocus />
            <button className="btn btn-primary mt" onClick={() => checkAnswer()} disabled={!answer.trim()}>Check ✓</button>
            {syllables.length > 1 ? (
              <button className="btn btn-secondary mt" onClick={useHint} style={{fontSize:'0.92rem'}}>
                💡 Sound it out
              </button>
            ) : (
              <button className="btn btn-secondary mt" disabled style={{fontSize:'0.92rem', opacity:0.35, cursor:'not-allowed'}}>
                💡 Sound it out
              </button>
            )}
          </>
        )}

        {/* Post-feedback action buttons */}
        {showFeedbackActions && (
          <div className="flex col gap mt">
            <button className="btn btn-primary" onClick={tryAgain}>↩ Try Again</button>
            {attemptCount >= 2 && (
              <button className="btn btn-secondary" onClick={skipWord}
                style={{opacity: 0.55, fontSize: '0.82rem', marginTop: 4}}>
                Skip this word
              </button>
            )}
          </div>
        )}

        {/* Speaking state */}
        {phase === 'speaking' && (
          <div className="text-center mt2 text-muted text-sm" style={{padding: '14px 0'}}>
            🎧 Listen carefully to the word and sentence...
          </div>
        )}
      </div>
    </div>
  );
}

// ── Session End Screen ─────────────────────────────────────────────────────
function SessionEndScreen({results, xpEarned, onHome, isRepair, restoredStreak, isCram}) {
  const correct=(results||[]).filter(r=>r.correct).length;
  const total=(results||[]).length;
  const pct=total>0?Math.round(correct/total*100):0;
  const wrongWords=(results||[]).filter(r=>!r.correct).map(r=>r.word);
  const rightWords=(results||[]).filter(r=>r.correct).map(r=>r.word);
  const emoji=pct>=90?'🏆':pct>=70?'🎉':pct>=50?'👍':'💪';
  const msg=pct>=90?'Outstanding! You\'re a spelling star!':pct>=70?'Great work! Keep it up!':pct>=50?'Good effort! Practice makes perfect.':'Keep going — every practice makes you better!';
  return (
    <div className="screen slide-up">
      <div className="card anim-confetti">
        <div className="mascot">{emoji}</div>
        <h2 className="text-center mb2">Session Complete!</h2>
        {isRepair&&<div className="feedback-bar feedback-correct" style={{marginBottom:12}}>🔥 Streak rescued! Back to {restoredStreak} days!</div>}
        {isCram&&<div className="cram-badge" style={{marginBottom:12,justifyContent:'center'}}>⚡ CRAM Session Complete — keep going tomorrow!</div>}
        <div className="stat-grid mb2">
          <div className="stat-card"><div className="stat-num" style={{color:'var(--success)'}}>{correct}/{total}</div><div className="stat-lbl">Correct</div></div>
          <div className="stat-card"><div className="stat-num" style={{color:'var(--gold)'}}>+{xpEarned} ⭐</div><div className="stat-lbl">XP Earned</div></div>
        </div>
        <div className="text-center mb2" style={{fontWeight:700}}>{msg}</div>
        {rightWords.length>0&&(<><div className="text-sm text-muted mb">Words you got right ✓</div><div className="word-chips mb2">{rightWords.map((w,i)=><span key={i} className="chip chip-mastered">{w}</span>)}</div></>)}
        {wrongWords.length>0&&(<><div className="divider"/><div className="text-sm text-muted mb">Keep practising:</div><div className="word-chips mb2">{wrongWords.map((w,i)=><span key={i} className="chip chip-review">{w}</span>)}</div></>)}
        <button className="btn btn-primary" onClick={onHome}>🏠 Back to Home</button>
      </div>
    </div>
  );
}

// ── Progress Screen ────────────────────────────────────────────────────────
function ProgressScreen({progress, onBack, initialTab}) {
  const [filter,setFilter]=useState(initialTab||'all');
  const entries=Object.entries(progress);
  const today=todayStr();
  const struggling=getStrugglingWords(progress);
  const filtered=filter==='all'?entries:filter==='mastered'?entries.filter(([,p])=>p.stage===4):filter==='learning'?entries.filter(([,p])=>p.stage>0&&p.stage<4):filter==='struggling'?struggling:entries.filter(([,p])=>p.stage>0&&p.stage<4&&(p.nextReview&&p.nextReview<=today||p.lastSeen===today));
  const stats=getProgressStats(progress);
  const stageBadge=(stage)=>{const m={4:['badge-green','Mastered'],3:['badge-blue','Consolidating'],2:['badge-purple','Learning'],1:['badge-orange','Shaky'],0:['badge-red','New']};const[cls,lbl]=m[stage]||['badge-red','New'];return <span className={`badge ${cls}`}>{lbl}</span>;};
  return (
    <div className="screen screen-top fade-in">
      <div className="w-max">
        <div className="flex between mb2"><h2>My Progress 📊</h2><button className="btn-icon" onClick={onBack}>✕ Close</button></div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:10,marginBottom:16}}>
          {[['✓ Mastered',stats.mastered,'var(--success)'],['Learning',stats.learning+stats.consolidating,'var(--primary-light)'],['Shaky',stats.shaky,'var(--gold)']].map(([l,n,c])=>(
            <div key={l} className="stat-card"><div className="stat-num" style={{color:c,fontSize:'1.4rem'}}>{n}</div><div className="stat-lbl">{l}</div></div>
          ))}
        </div>
        <div className="tab-bar">
          {[['all','All'],['mastered','Mastered'],['learning','Learning'],['review','Due Review'],['struggling','Struggling 🔥']].map(([k,l])=>(
            <button key={k} className={`tab ${filter===k?'active':''}`} onClick={()=>setFilter(k)}>{l}</button>
          ))}
        </div>
        <div className="scrollable">
          {filter==='struggling'&&filtered.length===0?(
            <div className="text-center" style={{padding:32}}>
              <div style={{fontSize:'2.5rem',marginBottom:8}}>💪</div>
              <div style={{fontWeight:800,marginBottom:4}}>Nothing here — you're on top of it!</div>
              <div className="text-muted text-sm">No struggling words right now. Keep it up!</div>
            </div>
          ):filtered.length===0?<div className="text-muted text-center" style={{padding:24}}>No words here yet!</div>:
            (filter==='struggling'?filtered:filtered.sort(([,a],[,b])=>{
              if(filter==='review'){
                const adue=a.nextReview&&a.nextReview<=today;
                const bdue=b.nextReview&&b.nextReview<=today;
                if(adue!==bdue) return adue?-1:1;
              }
              return b.stage-a.stage;
            })).map(([word,p])=>{
              const due=filter==='review'&&p.nextReview&&p.nextReview<=today;
              const notYet=filter==='review'&&!(p.nextReview&&p.nextReview<=today);
              return (
                <div key={word} className="word-row" style={notYet?{opacity:0.4}:{}}>
                  <span style={{fontWeight:700}}>{word}</span>
                  <div className="flex gap">
                    {filter==='review'&&<span className="text-xs text-muted">{due?'Ready ✓':'From '+p.nextReview}</span>}
                    {filter==='struggling'&&<span className="text-xs text-muted">{p.wrong||0}✗{p.skipped?' · Skipped':''}</span>}
                    {filter!=='review'&&filter!=='struggling'&&<span className="text-xs text-muted">{p.correct||0}✓ {p.wrong||0}✗</span>}
                    {stageBadge(p.stage)}
                  </div>
                </div>
              );
            })
          }
        </div>
      </div>
    </div>
  );
}

// ── Parent Dashboard ───────────────────────────────────────────────────────
function ParentDashboard({profile,progress,customWords,setCustomWords,setProfile,onBack}) {
  const [tab,setTab]=useState('overview');
  const [newWord,setNewWord]=useState('');
  const [newSentence,setNewSentence]=useState('');
  const [sentenceError,setSentenceError]=useState('');
  const [newPin,setNewPin]=useState('');
  const [pinSaved,setPinSaved]=useState(false);
  const [freezeDate,setFreezeDate]=useState('');
  const toggleFreeze=(freeze)=>{const p={...profile,streakFrozen:freeze,freezeUntil:freeze?(freezeDate||null):null};setProfile(p);saveStore({profile:p});};
  const stats=getProgressStats(progress);
  const addWord=()=>{
    const w=newWord.trim().toLowerCase();
    if(!w||customWords.find(c=>c.word===w)) return;
    const s=newSentence.trim();
    if(!s){setSentenceError('Please add a sentence for this word.');return;}
    // Auto-wrap word in quotes if not already present
    const re=new RegExp('"'+w.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+'"','i');
    const sentence=re.test(s)?s:s.replace(new RegExp('\\b'+w.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+'\\b','i'),`"${w}"`);
    if(!new RegExp('"'+w.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+'"','i').test(sentence)){setSentenceError(`The sentence must include the word "${w}".`);return;}
    setSentenceError('');
    setCustomWords([...customWords,{word:w,addedBy:'parent',date:todayStr(),sentence}]);
    setNewWord('');setNewSentence('');
  };
  const removeWord=(w)=>setCustomWords(customWords.filter(c=>c.word!==w));
  const savePin=()=>{if(/^\d{4}$/.test(newPin)){localStorage.setItem('ss_pin',newPin);setNewPin('');setPinSaved(true);setTimeout(()=>setPinSaved(false),2000);}};
  return (
    <div className="screen screen-top fade-in">
      <div className="w-max">
        <div className="flex between mb2"><h2>Parent Dashboard 👪</h2><button className="btn-icon" onClick={onBack}>✕</button></div>
        {profile&&<div className="text-sm text-muted mb2">Child: <strong>{profile.name}</strong> · Age {profile.age}</div>}
        <div className="tab-bar">
          {[['overview','Overview'],['words','Add Words'],['settings','Settings']].map(([k,l])=>(
            <button key={k} className={`tab ${tab===k?'active':''}`} onClick={()=>setTab(k)}>{l}</button>
          ))}
        </div>
        {tab==='overview'&&(
          <>
            <div className="stat-grid">
              <div className="stat-card"><div className="stat-num" style={{color:'var(--success)'}}>{stats.mastered}</div><div className="stat-lbl">✓ Mastered</div></div>
              <div className="stat-card"><div className="stat-num" style={{color:'var(--primary-light)'}}>{stats.learning+stats.consolidating}</div><div className="stat-lbl">↑ In Progress</div></div>
              <div className="stat-card"><div className="stat-num" style={{color:'var(--warning)'}}>🔥 {profile?.streak||0}</div><div className="stat-lbl">Streak</div></div>
              <div className="stat-card"><div className="stat-num" style={{color:'var(--gold)'}}>⭐ {profile?.totalXP||0}</div><div className="stat-lbl">Total XP</div></div>
            </div>
            <div className="card mt">
              <h3 className="mb">Spelling Age</h3>
              <div style={{fontSize:'2rem',fontWeight:900,color:'var(--gold)'}}>{profile?.spellingAge||WORD_DATA[profile?.levelIdx]?.label||'—'}</div>
              {profile&&<div className="text-sm text-muted mt">Actual age: {profile.age} · Working level: {WORD_DATA[profile.levelIdx]?.label}</div>}
            </div>
            <div className="card mt">
              <h3 className="mb">Custom Words ({customWords.length})</h3>
              {customWords.length===0?<div className="text-sm text-muted">No custom words yet. Add them in the "Add Words" tab.</div>:(
                <div className="word-chips">{customWords.map((cw,i)=><span key={i} className="chip chip-custom">{cw.word}</span>)}</div>
              )}
            </div>
            {stats.shaky>0&&(
              <div className="card mt">
                <h3 className="mb">Words Needing Practice</h3>
                <div className="scrollable" style={{maxHeight:'140px'}}>
                  {Object.entries(progress).filter(([,p])=>p.stage<=1).sort(([,a],[,b])=>a.stage-b.stage).slice(0,20).map(([w])=>(
                    <div key={w} className="word-row"><span style={{fontWeight:700}}>{w}</span><span className="badge badge-orange">Shaky</span></div>
                  ))}
                </div>
              </div>
            )}
            <div className="card mt">
              <h3 className="mb">🧊 Streak Freeze</h3>
              <div className="text-sm text-muted mb2">Going on holiday? Freeze the streak so it doesn't reset.</div>
              {profile?.streakFrozen?(
                <>
                  <div className="freeze-bar mb2">🧊 Streak frozen{profile.freezeUntil?` until ${profile.freezeUntil}`:' indefinitely'}</div>
                  <button className="btn btn-secondary" onClick={()=>toggleFreeze(false)}>Unfreeze Streak ✕</button>
                </>
              ):(
                <>
                  <label className="field-label">Return date (optional — leave blank for manual unfreeze)</label>
                  <input type="date" value={freezeDate} onChange={e=>setFreezeDate(e.target.value)}
                    min={todayStr()} className="input-field mb2" style={{fontSize:'0.95rem'}} />
                  <button className="btn btn-primary" onClick={()=>toggleFreeze(true)}>🧊 Freeze Streak</button>
                </>
              )}
            </div>
          </>
        )}
        {tab==='words'&&(
          <div className="card">
            <h3 className="mb">Add Custom Words</h3>
            <div className="text-sm text-muted mb2">Add words from school lists, books, or homework. They'll be prioritised in every practice session.</div>
            <input className="input-field mb2" type="text" value={newWord} onChange={e=>{setNewWord(e.target.value);setSentenceError('');}}
              onKeyDown={e=>e.key==='Enter'&&addWord()} placeholder="Enter a word..." autoCapitalize="none" autoCorrect="off" spellCheck="false" />
            <label className="field-label">Sentence using this word</label>
            <input className="input-field mb" type="text" value={newSentence} onChange={e=>{setNewSentence(e.target.value);setSentenceError('');}}
              onKeyDown={e=>e.key==='Enter'&&addWord()} placeholder={newWord?`Use "${newWord}" in a sentence...`:'Write a sentence with the word in it...'} autoCorrect="off" spellCheck="false" />
            <div className="text-xs text-muted mb2">Tip: include the word in your sentence — e.g. "She kicked the <em>ball</em>."</div>
            {sentenceError&&<div className="text-danger text-sm mb">{sentenceError}</div>}
            <button className="btn btn-primary mb2" onClick={addWord} disabled={!newWord.trim()||!newSentence.trim()}>Add Word</button>
            <div className="divider"/>
            <div className="text-sm text-muted mb">Custom list ({customWords.length}):</div>
            {customWords.length===0?<div className="text-muted text-sm">No words yet.</div>:(
              <div className="scrollable" style={{maxHeight:'300px'}}>
                {customWords.map((cw,i)=>(
                  <div key={i} className="word-row">
                    <div><span style={{fontWeight:700}}>{cw.word}</span><span className="text-xs text-muted" style={{marginLeft:8}}>Added {cw.date}</span></div>
                    <button className="btn-icon" onClick={()=>removeWord(cw.word)} style={{padding:'4px 10px',fontSize:'0.8rem'}}>✕</button>
                  </div>
                ))}
              </div>
            )}
          </div>
        )}
        {tab==='settings'&&(
          <div className="card">
            <h3 className="mb">Change Parent PIN</h3>
            <div className="text-sm text-muted mb2">Set a 4-digit PIN to protect the parent area.</div>
            <input className="input-field input-pin" type="password" value={newPin} onChange={e=>setNewPin(e.target.value)} placeholder="New PIN..." maxLength={4} />
            {pinSaved&&<div className="text-success text-sm text-center mt">✓ PIN saved!</div>}
            <button className="btn btn-primary mt" onClick={savePin} disabled={newPin.length!==4||!/^\d{4}$/.test(newPin)}>Save PIN</button>
            <div className="divider"/>
            <h3 className="mb">Child Profile</h3>
            {profile?(
              <>
                {[['Name',profile.name],['Age',profile.age],['Working Level',WORD_DATA[profile.levelIdx]?.label],['Spelling Age',profile.spellingAge||'—']].map(([l,v])=>(
                  <div key={l} className="word-row"><span className="text-muted text-sm">{l}</span><span style={{fontWeight:700}}>{v}</span></div>
                ))}
              </>
            ):<div className="text-muted text-sm">No profile yet.</div>}
          </div>
        )}
      </div>
    </div>
  );
}

// ── Main App ───────────────────────────────────────────────────────────────
function App() {
  const [screen,setScreen]=useState('loading');
  const [profile,setProfile]=useState(null);
  const [progress,setProgress]=useState({});
  const [customWords,setCustomWords]=useState([]);
  const [session,setSession]=useState(null);
  const [sessionResult,setSessionResult]=useState(null);
  const [progressTab,setProgressTab]=useState(null);
  const [theme,setTheme]=useState(()=>localStorage.getItem('ss_theme')||'dark');
  const [background,setBackground]=useState(()=>localStorage.getItem('ss_bg')||'space');

  useEffect(()=>{
    document.body.dataset.theme=theme;
    document.body.dataset.bg=background;
    localStorage.setItem('ss_theme',theme);
    localStorage.setItem('ss_bg',background);
  },[theme,background]);

  useEffect(()=>{
    initVoices();
    const d=loadStore();
    if(d.profile){
      let p={...d.profile};
      const today=todayStr();
      // Auto-lift freeze if return date has passed
      if(p.streakFrozen && p.freezeUntil && p.freezeUntil < today){
        p={...p,streakFrozen:false,freezeUntil:null};
      }
      // Expire repair offer if deadline passed
      if(p.streakRepairAvailable && p.streakRepairDeadline && p.streakRepairDeadline < today){
        p={...p,streakRepairAvailable:false,streakRepairDeadline:null,streakBeforeBreak:0};
      }
      // Check if streak broke while not frozen
      if(!p.streakFrozen && p.lastPlayed && p.lastPlayed < yesterdayStr() && !p.streakRepairAvailable){
        const missed=daysBetween(p.lastPlayed,today);
        if(missed<=2){
          // Offer repair window — expires in 2 days from today
          const deadline=addDays(2);
          p={...p,streakRepairAvailable:true,streakRepairDeadline:deadline,streakBeforeBreak:p.streak||0,streak:0};
        } else {
          p={...p,streak:0,streakRepairAvailable:false,streakRepairDeadline:null,streakBeforeBreak:0};
        }
      }
      setProfile(p); setProgress(d.progress||{}); setCustomWords(d.customWords||[]);
      if(JSON.stringify(p)!==JSON.stringify(d.profile)) saveStore({profile:p});
      setScreen('home');
    } else { setScreen('welcome'); }
  },[]);

  const saveCustomWords=(cw)=>{setCustomWords(cw);saveStore({customWords:cw});};

  const handleSetup=(p)=>{setProfile(p);saveStore({profile:p});setScreen('diagnostic');};

  const handleDiagnosticDone=(results)=>{
    const {spellingAge,levelIdx}=calcSpellingAge(results);
    const updated={...profile,spellingAge,levelIdx};
    setProfile(updated); saveStore({profile:updated}); setScreen('home');
  };

  const handleStartReview=()=>{
    const today=todayStr();
    const queue=[];
    const used=new Set();
    const fromIdx=profile.levelIdx;
    const toIdx=profile.cramMode?.active ? (profile.cramMode.targetLevelIdx ?? fromIdx) : fromIdx;
    // Iterate levels in order (easiest first) so lower tiers appear before higher tiers
    for(let li=fromIdx; li<=toIdx; li++){
      for(const w of getAllLevelWords(li)){
        if(used.has(w.word)) continue;
        const p=progress[w.word];
        if(p&&p.stage>0&&p.stage<4&&p.nextReview&&p.nextReview<=today){queue.push(w);used.add(w.word);}
      }
    }
    if(!queue.length) return;
    setSession({queue,isRepair:false,isCram:false,isReview:true});
    setScreen('practice');
  };

  const handleStartStruggling=()=>{
    const struggling=getStrugglingWords(progress);
    if(!struggling.length) return;
    // Build a word-to-metadata map across all levels so we can look up category/level info
    const wordMeta={};
    for(let li=0;li<WORD_DATA.length;li++){
      for(const w of getAllLevelWords(li)){
        if(!wordMeta[w.word]) wordMeta[w.word]=w;
      }
    }
    const queue=struggling.map(([word])=>wordMeta[word]||{word,category:'',level:'',levelIdx:profile.levelIdx}).slice(0,SESSION_SIZE);
    const seen=new Set();
    const deduped=queue.filter(w=>seen.has(w.word)?false:seen.add(w.word));
    setSession({queue:deduped,isRepair:false,isCram:false,isStruggling:true});
    setScreen('practice');
  };

  const handleStartSession=(isRepair=false, isCramSession=false)=>{
    const isCram = isCramSession && profile.cramMode?.active;
    const size = isCram ? CRAM_SESSION_SIZE : isRepair ? SESSION_SIZE*2 : SESSION_SIZE;
    const queue = isCram ? buildCramSession(profile, progress) : buildSession(profile.levelIdx,progress,customWords,size);
    setSession({queue,isRepair,isCram}); setScreen('practice');
  };

  const handleCramStart=(targetLevelIdx)=>{
    // Snapshot all words already mastered at CRAM start — exclude them from sessions and progress
    const masteredAtStart=Object.keys(progress).filter(w=>(progress[w]?.stage||0)>=4);
    const cramMode={active:true,targetLevelIdx,startDate:todayStr(),masteredAtStart};
    const np={...profile,cramMode};
    setProfile(np); saveStore({profile:np}); setScreen('home');
  };

  const handleExitCram=()=>{
    const np={...profile,cramMode:{active:false}};
    setProfile(np); saveStore({profile:np});
  };

  const handleCramExtend=()=>{
    const np={...profile,cramMode:{...profile.cramMode,expired:false,startDate:todayStr()}};
    setProfile(np); saveStore({profile:np});
  };

  const handleSessionComplete=({results,xpEarned})=>{
    const isCram = session?.isCram||false;
    let np={...progress};
    for(const r of results) np=updateWordProgress(np,r.word,r.correct,isCram,r.skipped||false);
    const today=todayStr(); const last=profile.lastPlayed;
    const isRepair=session?.isRepair||false;
    let streak=profile.streak||0;
    let restoredStreak=null;
    let np2;
    if(isRepair){
      restoredStreak=(profile.streakBeforeBreak||1);
      streak=restoredStreak;
      np2={...profile,streak,lastPlayed:today,totalXP:(profile.totalXP||0)+xpEarned,
        streakRepairAvailable:false,streakRepairDeadline:null,streakBeforeBreak:0};
    } else {
      if(!profile.streakFrozen){
        if(last!==today) streak=last===yesterdayStr()?streak+1:1;
      }
      np2={...profile,streak,lastPlayed:today,totalXP:(profile.totalXP||0)+xpEarned};
    }
    // Check CRAM completion
    if(isCram && np2.cramMode?.active){
      const cp = getCramProgress(np2, np);
      const startDate = np2.cramMode.startDate;
      const msPerDay = 86400000;
      const daysElapsed = Math.floor((new Date(today) - new Date(startDate)) / msPerDay);
      if(cp.pct >= 100){
        np2 = {...np2, cramMode:{...np2.cramMode, active:false, completedDate:today}};
      } else if(daysElapsed >= CRAM_DAYS && !np2.cramMode.expired){
        np2 = {...np2, cramMode:{...np2.cramMode, expired:true}};
      }
    }
    setProfile(np2); setProgress(np); setSessionResult({results,xpEarned,isRepair,restoredStreak,isCram}); saveStore({profile:np2,progress:np}); setScreen('session-end');
  };

  if(screen==='loading') return <div className="loading-screen">🌟</div>;
  const goParent=()=>setScreen('parent-pin');
  const goHome=()=>setScreen('home');

  if(screen==='welcome') return <WelcomeScreen onChild={()=>setScreen('setup')} onParent={goParent}/>;
  if(screen==='setup') return <SetupScreen onDone={handleSetup} onBack={()=>setScreen('welcome')}/>;
  if(screen==='diagnostic') return <DiagnosticScreen profile={profile} onDone={handleDiagnosticDone}/>;
  if(screen==='cram-setup') return <CramSetupScreen profile={profile} onStart={handleCramStart} onBack={goHome}/>;
  if(screen==='home') return <HomeScreen profile={profile} progress={progress} customWords={customWords} onStart={handleStartSession} onStartReview={handleStartReview} onStartStruggling={handleStartStruggling} onParent={goParent} onProgress={(tab)=>{setProgressTab(tab||null);setScreen('progress');}} onCramSetup={()=>setScreen('cram-setup')} onExitCram={handleExitCram} onCramExtend={handleCramExtend} theme={theme} setTheme={setTheme} background={background} setBackground={setBackground}/>;
  if(screen==='practice'&&session) return <PracticeScreen session={session} onComplete={handleSessionComplete}/>;
  if(screen==='session-end') return <SessionEndScreen results={sessionResult?.results} xpEarned={sessionResult?.xpEarned} isRepair={sessionResult?.isRepair} restoredStreak={sessionResult?.restoredStreak} isCram={sessionResult?.isCram} onHome={goHome}/>;
  if(screen==='parent-pin') return <PinScreen onSuccess={()=>setScreen('parent')} onBack={()=>setScreen(profile?'home':'welcome')}/>;
  if(screen==='parent') return <ParentDashboard profile={profile} progress={progress} customWords={customWords} setCustomWords={saveCustomWords} setProfile={(p)=>{setProfile(p);saveStore({profile:p});}} onBack={()=>setScreen(profile?'home':'welcome')}/>;
  if(screen==='progress') return <ProgressScreen progress={progress} onBack={goHome} initialTab={progressTab}/>;
  return <WelcomeScreen onChild={()=>setScreen('setup')} onParent={goParent}/>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

</script>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => navigator.serviceWorker.register('sw.js'));
}
</script>
</body>
</html>
